<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PerfectLaw DMS</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 13px;
      background: #f4f4f4;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: #0d2c5e;
      color: #fff;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .subtitle { font-size: 11px; opacity: .7; margin-left: auto; }

    /* ── Login screen ── */
    #loginScreen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 12px;
    }
    #loginScreen h2 { font-size: 14px; color: #0d2c5e; }
    .field { width: 100%; display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; font-weight: 600; color: #555; }
    .field input {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    .field input:focus { outline: none; border-color: #0d2c5e; }
    .btn {
      width: 100%;
      padding: 8px;
      background: #0d2c5e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }
    .btn:hover { background: #1a4080; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .btn-secondary {
      background: #fff;
      color: #0d2c5e;
      border: 1px solid #0d2c5e;
    }
    .btn-secondary:hover { background: #e8eef7; }

    /* ── Main app ── */
    #appScreen { flex: 1; display: none; flex-direction: column; overflow: hidden; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid #0d2c5e;
      flex-shrink: 0;
    }
    .tab {
      flex: 1;
      padding: 8px 4px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: #666;
      border: none;
      background: none;
    }
    .tab.active { color: #0d2c5e; border-bottom: 2px solid #0d2c5e; margin-bottom: -2px; }

    /* ── Panels ── */
    .panel { flex: 1; overflow-y: auto; padding: 10px; display: none; flex-direction: column; gap: 8px; }
    .panel.active { display: flex; }

    /* ── Search bar ── */
    .search-row {
      display: flex;
      gap: 6px;
    }
    .search-row input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
    }
    .search-row input:focus { outline: none; border-color: #0d2c5e; }
    .search-row button {
      padding: 6px 12px;
      background: #0d2c5e;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    .search-row button:hover { background: #1a4080; }

    /* ── Matter list ── */
    .matter-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .matter-card:hover { border-color: #0d2c5e; background: #f0f4fb; }
    .matter-card.selected { border-color: #0d2c5e; background: #e8eef7; }
    .matter-card .matter-name { font-weight: 600; color: #0d2c5e; font-size: 12px; }
    .matter-card .matter-sub { font-size: 11px; color: #777; margin-top: 2px; }
    .matter-card .matter-num { font-size: 10px; color: #aaa; }

    /* ── Document list ── */
    .doc-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: border-color .15s;
    }
    .doc-card:hover { border-color: #0d2c5e; background: #f0f4fb; }
    .doc-card .doc-icon { font-size: 20px; flex-shrink: 0; }
    .doc-card .doc-info { flex: 1; min-width: 0; }
    .doc-card .doc-name { font-size: 12px; font-weight: 600; color: #0d2c5e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .doc-card .doc-meta { font-size: 10px; color: #999; margin-top: 2px; }
    .doc-card .doc-open { padding: 4px 8px; font-size: 11px; background: #0d2c5e; color: #fff; border: none; border-radius: 3px; cursor: pointer; flex-shrink: 0; }
    .doc-card .doc-open:hover { background: #1a4080; }

    /* ── Current doc panel ── */
    .current-doc-info {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px;
    }
    .current-doc-info .label { font-size: 11px; color: #888; margin-bottom: 2px; }
    .current-doc-info .value { font-size: 12px; font-weight: 600; color: #0d2c5e; }

    /* ── Save actions ── */
    .save-actions { display: flex; flex-direction: column; gap: 8px; }

    /* ── Status / messages ── */
    .status-bar {
      background: #fff;
      border-top: 1px solid #ddd;
      padding: 6px 10px;
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
      min-height: 28px;
    }
    .status-bar.success { color: #2e7d32; background: #e8f5e9; }
    .status-bar.error { color: #c62828; background: #ffebee; }
    .status-bar.loading { color: #1565c0; background: #e3f2fd; }

    .empty { text-align: center; color: #aaa; font-size: 12px; padding: 20px; }
    .section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .5px; }

    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: #0d2c5e; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-btn { background: none; border: none; color: #0d2c5e; cursor: pointer; font-size: 12px; font-weight: 600; padding: 0; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { text-decoration: underline; }

    .badge { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 10px; font-weight: 600; background: #e8eef7; color: #0d2c5e; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div style="font-size:18px;">⚖️</div>
  </div>
  <div>
    <h1>PerfectLaw DMS</h1>
  </div>
  <div class="subtitle" id="userLabel"></div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h2>Sign in to PerfectLaw DMS</h2>
  <div class="field">
    <label>Username</label>
    <input type="text" id="loginUser" placeholder="Your PerfectLaw username" autocomplete="username" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="loginPass" placeholder="Password" autocomplete="current-password" />
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  <div id="loginError" style="color:#c62828;font-size:11px;display:none;"></div>
</div>

<!-- MAIN APP -->
<div id="appScreen">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('browse')">📂 Browse</button>
    <button class="tab" onclick="switchTab('recent')">🕐 Recent</button>
    <button class="tab" onclick="switchTab('save')">💾 Save</button>
  </div>

  <!-- BROWSE PANEL -->
  <div class="panel active" id="panel-browse">
    <div id="browseMatters">
      <div class="search-row">
        <input type="text" id="matterSearch" placeholder="Search matters..." onkeydown="if(event.key==='Enter') searchMatters()" />
        <button onclick="searchMatters()">Go</button>
      </div>
      <div id="matterList"><div class="empty">Search for a matter above</div></div>
    </div>
    <div id="browseDocs" style="display:none;">
      <button class="back-btn" onclick="backToMatters()">← Back to Matters</button>
      <div class="section-title" id="selectedMatterTitle" style="margin-top:4px;"></div>
      <div id="docList"><div class="empty">Loading documents...</div></div>
    </div>
  </div>

  <!-- RECENT PANEL -->
  <div class="panel" id="panel-recent">
    <div class="section-title">Recently Used Matters</div>
    <div id="recentList"><div class="empty"><span class="spinner"></span>Loading...</div></div>
  </div>

  <!-- SAVE PANEL -->
  <div class="panel" id="panel-save">
    <div class="section-title">Current Document</div>
    <div class="current-doc-info">
      <div class="label">Document name</div>
      <div class="value" id="currentDocName">—</div>
      <div class="label" style="margin-top:6px;">Linked matter</div>
      <div class="value" id="currentMatterName">Not linked</div>
      <div class="label" style="margin-top:6px;">Record #</div>
      <div class="value" id="currentRecordNum">—</div>
    </div>

    <div class="section-title">Save to DMS</div>
    <div class="save-actions">
      <div class="field">
        <label>Document Type</label>
        <select id="saveDocType" style="padding:6px 10px;border:1px solid #ccc;border-radius:4px;font-size:12px;">
          <option value="CORR">CORR - Correspondence</option>
          <option value="PLLD">PLLD - Pleading</option>
          <option value="MISC">MISC - Miscellaneous</option>
          <option value="MASTER">MASTER - Master</option>
          <option value="NOTES">NOTES - Notes</option>
          <option value="3RDPTY">3RDPTY - Third Party</option>
        </select>
      </div>
      <button class="btn" onclick="saveCurrentDoc()">💾 Save to Current Matter</button>
      <button class="btn btn-secondary" onclick="saveToNewMatter()">📂 Save to Different Matter...</button>
    </div>

    <div class="section-title" style="margin-top:4px;">Open Documents in DMS</div>
    <div id="openDocsList"><div class="empty">No documents currently open in DMS</div></div>
  </div>
</div>

<!-- Status bar -->
<div class="status-bar" id="statusBar">Ready</div>

<script>
  const DMS_BASE = 'https://plapp.kempsmith.com/DMS';
  const LOCAL_AGENT = 'http://localhost:8190';
  let sessionActive = false;
  let currentMatter = null; // { ClientCode, MatterCode, MatterName, RecordNumber }
  let currentDocRecord = null;
  let operatorCode = '';

  // ── Office Init ──
  Office.onReady(() => {
    checkSession();
  });

  // ── Session / Login ──
  async function checkSession() {
    try {
      const r = await dmsPost('/api/User/ValidateSession', {});
      if (r.isSuccess && r.data) {
        showApp();
      } else {
        showLogin();
      }
    } catch(e) {
      showLogin();
    }
  }

  async function doLogin() {
    const user = document.getElementById('loginUser').value.trim();
    const pass = document.getElementById('loginPass').value;
    if (!user || !pass) return setStatus('Please enter username and password.', 'error');
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const r = await fetch(DMS_BASE + '/Account/Login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ UserName: user, Password: pass, RememberMe: false })
      });
      if (r.ok || r.redirected) {
        // Validate session after login
        const v = await dmsPost('/api/User/ValidateSession', {});
        if (v.isSuccess && v.data) {
          operatorCode = user.toUpperCase();
          showApp();
        } else {
          showLoginError('Invalid username or password.');
        }
      } else {
        showLoginError('Login failed. Check your credentials.');
      }
    } catch(e) {
      showLoginError('Cannot reach PerfectLaw server. Check your network.');
    }
    btn.disabled = false; btn.textContent = 'Sign In';
  }

  function showLoginError(msg) {
    const el = document.getElementById('loginError');
    el.textContent = msg; el.style.display = 'block';
  }

  function showLogin() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
  }

  function showApp() {
    sessionActive = true;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    loadRecent();
    loadOpenDocs();
    refreshCurrentDocInfo();
    setStatus('Connected to PerfectLaw DMS', 'success');
  }

  // ── Tabs ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      const names = ['browse','recent','save'];
      t.classList.toggle('active', names[i] === name);
    });
    document.querySelectorAll('.panel').forEach(p => {
      p.classList.toggle('active', p.id === 'panel-' + name);
    });
    if (name === 'save') { loadOpenDocs(); refreshCurrentDocInfo(); }
    if (name === 'recent') { loadRecent(); }
  }

  // ── Matter Search ──
  async function searchMatters() {
    const q = document.getElementById('matterSearch').value.trim();
    if (!q) return;
    setStatus('Searching matters...', 'loading');
    const list = document.getElementById('matterList');
    list.innerHTML = '<div class="empty"><span class="spinner"></span>Searching...</div>';
    try {
      const r = await dmsPost('/api/matter/search', {
        SearchText: q, PageNumber: 1, PageSize: 25,
        SortField: 'MatterName', SortDirection: 'ASC'
      });
      if (r.isSuccess && r.data && r.data.length) {
        list.innerHTML = '';
        r.data.forEach(m => {
          const card = document.createElement('div');
          card.className = 'matter-card';
          card.innerHTML = `
            <div class="matter-name">${esc(m.MatterName || m.matterName || '')}</div>
            <div class="matter-sub">${esc(m.ClientName || m.clientName || '')}</div>
            <div class="matter-num">${esc(m.ClientCode || '')} | ${esc(m.MatterCode || '')} &nbsp; <span class="badge">${esc(m.MatterStatus || '')}</span></div>
          `;
          card.onclick = () => openMatterDocs(m);
          list.appendChild(card);
        });
        setStatus(`Found ${r.data.length} matter(s)`, 'success');
      } else {
        list.innerHTML = '<div class="empty">No matters found</div>';
        setStatus('No results', '');
      }
    } catch(e) {
      list.innerHTML = '<div class="empty">Search failed</div>';
      setStatus('Search error: ' + e.message, 'error');
    }
  }

  async function openMatterDocs(matter) {
    currentMatter = matter;
    document.getElementById('browseMatters').style.display = 'none';
    document.getElementById('browseDocs').style.display = 'flex';
    document.getElementById('browseDocs').style.flexDirection = 'column';
    document.getElementById('browseDocs').style.gap = '8px';
    document.getElementById('selectedMatterTitle').textContent =
      (matter.MatterName || matter.matterName || '') + ' — ' + (matter.ClientCode || '') + ' | ' + (matter.MatterCode || '');
    const list = document.getElementById('docList');
    list.innerHTML = '<div class="empty"><span class="spinner"></span>Loading documents...</div>';
    setStatus('Loading documents...', 'loading');
    try {
      const r = await dmsPost('/api/document/getbymatter', {
        ClientCode: matter.ClientCode || matter.clientCode,
        MatterCode: matter.MatterCode || matter.matterCode,
        PageNumber: 1, PageSize: 100,
        SortField: 'CreatedOn', SortDirection: 'DESC'
      });
      if (r.isSuccess && r.data && r.data.length) {
        list.innerHTML = '';
        r.data.forEach(doc => renderDocCard(doc, list));
        setStatus(`${r.data.length} document(s)`, 'success');
      } else {
        list.innerHTML = '<div class="empty">No documents in this matter</div>';
        setStatus('No documents found', '');
      }
    } catch(e) {
      list.innerHTML = '<div class="empty">Failed to load documents</div>';
      setStatus('Error: ' + e.message, 'error');
    }
  }

  function backToMatters() {
    document.getElementById('browseMatters').style.display = 'flex';
    document.getElementById('browseMatters').style.flexDirection = 'column';
    document.getElementById('browseMatters').style.gap = '8px';
    document.getElementById('browseDocs').style.display = 'none';
  }

  // ── Recent Matters ──
  async function loadRecent() {
    const list = document.getElementById('recentList');
    list.innerHTML = '<div class="empty"><span class="spinner"></span>Loading...</div>';
    try {
      const r = await dmsPost('/api/matter/getrecent', {
        PageNumber: 1, PageSize: 20, SortField: 'LastUsedDate', SortDirection: 'DESC'
      });
      if (r.isSuccess && r.data && r.data.length) {
        list.innerHTML = '';
        r.data.forEach(m => {
          const card = document.createElement('div');
          card.className = 'matter-card';
          card.innerHTML = `
            <div class="matter-name">${esc(m.MatterName || m.matterName || '')}</div>
            <div class="matter-sub">${esc(m.ClientName || m.clientName || '')}</div>
            <div class="matter-num">${esc(m.ClientCode || '')} | ${esc(m.MatterCode || '')}</div>
          `;
          card.onclick = () => { switchTab('browse'); openMatterDocs(m); };
          list.appendChild(card);
        });
      } else {
        list.innerHTML = '<div class="empty">No recent matters</div>';
      }
    } catch(e) {
      // Fallback: use recent matters from main DMS page structure
      list.innerHTML = '<div class="empty">Could not load recent matters</div>';
    }
  }

  // ── Render Document Card ──
  function renderDocCard(doc, container) {
    const name = doc.DocumentName || doc.documentName || '';
    const type = doc.DocumentType || doc.documentType || '';
    const date = doc.CreatedOn || doc.createdOn || '';
    const recNum = doc.RecordNumber || doc.recordNumber || '';
    const ext = name.split('.').pop().toLowerCase();
    const icon = ext === 'pdf' ? '📄' : ext === 'xlsx' || ext === 'xls' ? '📊' : ext === 'docx' || ext === 'doc' ? '📝' : '📎';
    const card = document.createElement('div');
    card.className = 'doc-card';
    card.innerHTML = `
      <div class="doc-icon">${icon}</div>
      <div class="doc-info">
        <div class="doc-name" title="${esc(name)}">${esc(name)}</div>
        <div class="doc-meta">${esc(type)} &bull; ${formatDate(date)} &bull; #${esc(recNum)}</div>
      </div>
      <button class="doc-open" onclick="openDoc(${JSON.stringify(doc).replace(/"/g,'&quot;')})">Open</button>
    `;
    container.appendChild(card);
  }

  // ── Open Document ──
  async function openDoc(doc) {
    const name = doc.DocumentName || doc.documentName || '';
    const recNum = doc.RecordNumber || doc.recordNumber || '';
    const clientCode = doc.ClientCode || doc.clientCode || (currentMatter && currentMatter.ClientCode) || '';
    const matterCode = doc.MatterCode || doc.matterCode || (currentMatter && currentMatter.MatterCode) || '';
    setStatus('Opening document...', 'loading');

    // 1. Check local agent is running
    try {
      const local = await fetch(LOCAL_AGENT + '/api/islocal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Operator: operatorCode, ClientCode: clientCode, MatterCode: matterCode, RecordNumber: recNum, DocumentName: name })
      });
      const localData = await local.json();
      if (!localData.isSuccess || !localData.data) {
        setStatus('PerfectLaw local agent not running. Please start PerfectLaw desktop app.', 'error');
        return;
      }
    } catch(e) {
      setStatus('Local agent not reachable (port 8190). Open PerfectLaw desktop app first.', 'error');
      return;
    }

    // 2. Check lock
    await dmsPost('/api/document/CheckLock', { RecordNumber: recNum });

    // 3. Open via local agent
    try {
      const openResp = await fetch(LOCAL_AGENT + '/api/open', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Operator: operatorCode, ClientCode: clientCode, MatterCode: matterCode, RecordNumber: recNum, DocumentName: name, CanLock: 'true', useWith: null })
      });
      const openData = await openResp.json();
      if (openData.isSuccess) {
        // 4. Update history
        await dmsPost('/api/document/updatehistory', { RecordNumber: recNum });
        currentDocRecord = { RecordNumber: recNum, DocumentName: name, ClientCode: clientCode, MatterCode: matterCode };
        refreshCurrentDocInfo();
        setStatus(`✓ Opened: ${name}`, 'success');
      } else {
        setStatus('Failed to open document via local agent.', 'error');
      }
    } catch(e) {
      setStatus('Error opening document: ' + e.message, 'error');
    }
  }

  // ── Save Document ──
  async function saveCurrentDoc() {
    if (!currentDocRecord) {
      setStatus('No document currently linked. Open a document from DMS first.', 'error');
      return;
    }
    const docType = document.getElementById('saveDocType').value;
    setStatus('Saving document...', 'loading');
    try {
      // Ask local agent to save back
      const r = await fetch(LOCAL_AGENT + '/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ RecordNumber: currentDocRecord.RecordNumber, DocumentType: docType })
      });
      const data = await r.json();
      if (data.isSuccess) {
        setStatus('✓ Document saved to DMS successfully', 'success');
      } else {
        setStatus('Save failed: ' + (data.message || 'Unknown error'), 'error');
      }
    } catch(e) {
      setStatus('Save error: ' + e.message, 'error');
    }
  }

  async function saveToNewMatter() {
    switchTab('browse');
    setStatus('Select a matter to save to, then use Save tab', '');
  }

  // ── Load Open Docs ──
  async function loadOpenDocs() {
    const list = document.getElementById('openDocsList');
    try {
      const r = await fetch(LOCAL_AGENT + '/api/list', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}'
      });
      const data = await r.json();
      if (data.isSuccess && data.data && data.data.length) {
        list.innerHTML = '';
        data.data.forEach(doc => {
          const item = document.createElement('div');
          item.className = 'doc-card';
          item.innerHTML = `
            <div class="doc-icon">📝</div>
            <div class="doc-info">
              <div class="doc-name">${esc(doc.DocumentName || '')}</div>
              <div class="doc-meta">#${esc(doc.RecordNumber || '')}</div>
            </div>
            <button class="doc-open" onclick="saveSingleDoc('${esc(doc.RecordNumber)}')">Save</button>
          `;
          list.appendChild(item);
        });
      } else {
        list.innerHTML = '<div class="empty">No documents currently open in DMS</div>';
      }
    } catch(e) {
      list.innerHTML = '<div class="empty">Local agent not running</div>';
    }
  }

  async function saveSingleDoc(recNum) {
    setStatus('Saving...', 'loading');
    try {
      const r = await fetch(LOCAL_AGENT + '/api/save/' + recNum, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: '{}'
      });
      const data = await r.json();
      setStatus(data.isSuccess ? '✓ Saved successfully' : 'Save failed', data.isSuccess ? 'success' : 'error');
    } catch(e) {
      setStatus('Save error: ' + e.message, 'error');
    }
  }

  // ── Current Doc Info ──
  function refreshCurrentDocInfo() {
    document.getElementById('currentDocName').textContent = currentDocRecord ? currentDocRecord.DocumentName : '—';
    document.getElementById('currentMatterName').textContent = currentMatter ? (currentMatter.MatterName || currentMatter.matterName || 'Unknown') : 'Not linked';
    document.getElementById('currentRecordNum').textContent = currentDocRecord ? currentDocRecord.RecordNumber : '—';
  }

  // ── Helpers ──
  async function dmsPost(path, body) {
    const r = await fetch(DMS_BASE + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify(body)
    });
    return r.json();
  }

  function setStatus(msg, type) {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = 'status-bar' + (type ? ' ' + type : '');
    if (type === 'success') setTimeout(() => { if (bar.textContent === msg) { bar.textContent = 'Ready'; bar.className = 'status-bar'; } }, 4000);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatDate(str) {
    if (!str) return '';
    try { return new Date(str).toLocaleDateString(); } catch(e) { return str; }
  }
</script>
</body>
</html>
